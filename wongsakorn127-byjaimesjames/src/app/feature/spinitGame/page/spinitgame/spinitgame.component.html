<main class="min-h-screen bg-spinit-game px-5 pb-28 pt-28 text-center text-white overflow-x-hidden">
  <app-credit-badge [isLight]="false" />

  <section class="game-layout mx-auto mt-8 flex w-full max-w-[920px] flex-col items-center gap-8 lg:flex-row lg:items-start lg:justify-center">
    <div class="wheel-area">
      <div class="pointer" aria-hidden="true"></div>
      <div
        class="wheel"
        [style.background]="wheelBackground"
        [style.transform]="'rotate(' + rotation + 'deg)'"
        aria-label="Spin It wheel"
      >
        @for (name of names; track $index) {
          <div class="wheel-label" [style.transform]="'rotate(' + labelAngle($index) + 'deg)'">
            <span>{{ name }}</span>
          </div>
        }
        <div class="wheel-center"></div>
      </div>
    </div>

    <div class="control-panel w-full max-w-[380px] rounded-3xl bg-white p-5 text-left text-[#3B1768] shadow-xl">
      <label for="names" class="text-xl font-semibold">Names</label>
      <p class="mb-3 mt-1 text-sm text-[#76568F]">One name per line</p>
      <textarea
        id="names"
        [(ngModel)]="namesText"
        (ngModelChange)="onNamesChange()"
        [disabled]="isSpinning"
        rows="7"
        class="w-full resize-none rounded-2xl border-2 border-[#DDD0EC] p-4 text-lg outline-none transition focus:border-[#8B5CF6] disabled:opacity-60"
        placeholder="var1&#10;var2&#10;var3"
      ></textarea>
      <div class="mt-2 flex justify-between text-sm text-[#76568F]">
        <span>Spaces inside names are allowed</span>
        <span>{{ names.length }} names</span>
      </div>
      <button
        (click)="spin()"
        [disabled]="isSpinning || names.length < 2"
        class="mt-5 w-full rounded-2xl bg-[#7137C8] px-6 py-3 text-xl font-semibold text-white transition hover:bg-[#5B21B6] disabled:cursor-not-allowed disabled:opacity-50"
      >
        {{ isSpinning ? 'Spinning...' : 'Spin it!' }}
      </button>
      @if (names.length < 2) {
        <p class="mt-3 text-center text-sm text-[#A04468]">Add at least 2 names to spin</p>
      }
    </div>
  </section>

  @if (winner) {
    <div class="winner-card mx-auto mt-8 w-fit rounded-3xl bg-white px-8 py-5 text-[#3B1768] shadow-xl" aria-live="polite">
      <p class="text-sm font-semibold uppercase tracking-widest text-[#8B5CF6]">Winner</p>
      <h2 class="mt-1 max-w-[80vw] break-words text-4xl font-bold">{{ winner }}</h2>
    </div>
  }
</main>
